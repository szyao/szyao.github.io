<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>音乐驱动的光环效果</title>
    <style>
        #avatar {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
        }
        .halo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.5);
            animation: haloPulse 1s infinite;
        }
        @keyframes haloPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <img id="avatar" src="public/img/mz-nobg.jpg" alt="Avatar">
    <div class="halo"></div>
    
    <audio id="music" controls src="public/img/music.mp3"></audio>
    
    <script src="public/js/music.js"></script>
</body>
</html>
